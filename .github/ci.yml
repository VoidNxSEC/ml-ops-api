name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      enable-tmate:
        description: 'Enable tmate debug session'
        required: false
        type: boolean
        default: false

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

jobs:
  # ── Rust CI ─────────────────────────────────────────────────────────────────
  rust-ci:
    name: Rust CI (${{ matrix.rust }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rust: [stable, beta]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            api/target
          key: ${{ runner.os }}-cargo-${{ matrix.rust }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-${{ matrix.rust }}-

      - name: Check formatting
        working-directory: api
        run: cargo fmt -- --check

      - name: Clippy
        working-directory: api
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build
        working-directory: api
        run: cargo build --verbose --all-features

      - name: Test
        working-directory: api
        run: cargo test --verbose --all-features

      - name: Build release
        working-directory: api
        run: cargo build --release --verbose

      - name: Upload binary
        if: matrix.rust == 'stable'
        uses: actions/upload-artifact@v4
        with:
          name: ml-offload-api-binary
          path: api/target/release/ml-offload-api
          retention-days: 7

  # ── Nix CI ──────────────────────────────────────────────────────────────────
  nix-ci:
    name: Nix Flake CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v14

      - name: Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v8

      - name: Check flake
        run: nix flake check --show-trace

      - name: Build default (api)
        run: nix build .#api --print-build-logs

      - name: Build tensorforge
        run: nix build .#forge --print-build-logs

      - name: Test devShell
        run: nix develop --command bash -c "rustc --version && echo devShell OK"

  # ── Security Audit ───────────────────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-audit-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run security audit
        working-directory: api
        run: cargo audit

  # ── Coverage ─────────────────────────────────────────────────────────────────
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            api/target
          key: ${{ runner.os }}-cargo-cov-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked

      - name: Generate coverage
        working-directory: api
        run: cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: api/lcov.info
          fail_ci_if_error: false

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/htmlcov/
          retention-days: 7

  # ── CI Summary ───────────────────────────────────────────────────────────────
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [rust-ci, nix-ci, security, coverage]
    if: always()
    steps:
      - name: Write summary
        run: |
          echo "## CI Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Rust CI | ${{ needs.rust-ci.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Nix CI | ${{ needs.nix-ci.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security | ${{ needs.security.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Coverage | ${{ needs.coverage.result }} |" >> $GITHUB_STEP_SUMMARY

      - name: Comment PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const jobs = {
              'Rust CI': '${{ needs.rust-ci.result }}',
              'Nix CI':  '${{ needs.nix-ci.result }}',
              'Security': '${{ needs.security.result }}',
              'Coverage': '${{ needs.coverage.result }}'
            };
            const icon = r => r === 'success' ? '✅' : r === 'skipped' ? '⏭️' : '❌';
            const body = [
              '## CI Summary',
              '',
              Object.entries(jobs).map(([k,v]) => `- ${icon(v)} **${k}**: ${v}`).join('\n')
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

  # ── tmate debug ──────────────────────────────────────────────────────────────
  debug:
    name: Debug Session
    runs-on: ubuntu-latest
    if: failure() || inputs.enable-tmate == true
    needs: [rust-ci, nix-ci]
    steps:
      - uses: actions/checkout@v4
      - uses: mxschmitt/action-tmate@v3
        with:
          limit-access-to-actor: true
          timeout-minutes: 30
